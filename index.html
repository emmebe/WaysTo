<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ways To - Vintage Slot Machine</title>
    <link rel="stylesheet" href="slot-machine.css">
</head>
<body>
    <main class="casino-shell">
        <header class="machine-header">
            <div class="bulb-frame">
                <div class="bulb-row top"></div>
                <div class="bulb-row bottom"></div>
                <div class="bulb-column left"></div>
                <div class="bulb-column right"></div>
            </div>
            <div class="header-content">
                <h1>Ways To</h1>
                <p>Vintage Ideation Mode</p>
            </div>
            <label class="constraints-toggle" for="constraintsPlusToggle">
                <input type="checkbox" id="constraintsPlusToggle" checked>
                <span>Constraints+</span>
            </label>
        </header>

        <section class="machine-body">
            <div class="reel-bank" id="reelBank" aria-label="Card reels"></div>

            <aside class="control-panel">
                <div class="lever-stand">
                    <div class="lever-base" aria-hidden="true"></div>
                    <div class="lever" id="lever" role="slider" aria-label="Pull lever" tabindex="0">
                        <span class="lever-knob"></span>
                    </div>
                </div>
                <div class="action-stack">
                    <button type="button" id="spinButton" class="btn btn-spin">SPIN</button>
                    <button type="button" id="saveButton" class="btn btn-save">SAVE DRAW</button>
                    <p id="saveStatus" class="save-status"></p>
                </div>
            </aside>

            <aside class="outcome-panel">
                <div class="outcome-header">
                    <h2>Brainstorming Notes</h2>
                </div>
                <div class="note-container">
                    <textarea id="ideationNote" placeholder="Write your ideas here..." maxlength="500"></textarea>
                    <div id="charCount">0 / 500</div>
                </div>
            </aside>
        </section>
    </main>
    <script src="decks-data.js"></script>
    <script src="supabase-config.js"></script>
    <script src="save-draws.js"></script>
    <script src="slot-machine.js"></script>
</body>
</html>
